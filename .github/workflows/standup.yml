name: Weekly standup

# One post a week to Discord: what's in flight, what's waiting on review, and
# what's free to pick up. The point is that nobody has to go digging through
# the issue tracker to know where the project is.

on:
  schedule:
    - cron: "0 16 * * 1" # Mondays, 16:00 UTC
  workflow_dispatch:

permissions:
  issues: read
  pull-requests: read

jobs:
  standup:
    name: Post the board
    runs-on: ubuntu-latest
    steps:
      - name: Build and post digest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEBHOOK: ${{ secrets.DISCORD_ANNOUNCE_WEBHOOK }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK:-}" ]; then
            echo "DISCORD_ANNOUNCE_WEBHOOK not set — skipping."
            exit 0
          fi

          list() { # label -> "• #12 title — @who" lines, max 8
            gh issue list --repo "$REPO" --state open --limit 8 "$@" \
              --json number,title,assignees \
              -q '.[] | "• [#\(.number)] \(.title[0:60])" + (if (.assignees|length) > 0 then " — @\(.assignees[0].login)" else "" end)'
          }

          in_flight=$(list --label "in progress" || true)
          up_for_grabs=$(gh issue list --repo "$REPO" --state open --limit 8 \
            --label "good first issue" --search "no:assignee" \
            --json number,title -q '.[] | "• [#\(.number)] \(.title[0:60])"' || true)
          in_review=$(gh pr list --repo "$REPO" --state open --limit 8 \
            --json number,title,author,isDraft \
            -q '.[] | select(.isDraft|not) | "• [#\(.number)] \(.title[0:60]) — @\(.author.login)"' || true)

          [ -z "$in_flight" ] && in_flight="_Nothing claimed right now._"
          [ -z "$up_for_grabs" ] && up_for_grabs="_Nothing tagged for newcomers — worth adding some._"
          [ -z "$in_review" ] && in_review="_No open pull requests._"

          jq -n \
            --arg flight "$in_flight" \
            --arg grabs "$up_for_grabs" \
            --arg review "$in_review" \
            --arg url "https://github.com/$REPO/issues" \
            '{
              content: "**Where Bobby Speak is this week**",
              embeds: [{
                title: "The board",
                url: $url,
                color: 15229450,
                fields: [
                  { name: "🛠️ Being worked on", value: $flight },
                  { name: "👀 Waiting on review", value: $review },
                  { name: "🌱 Free to pick up", value: $grabs }
                ],
                footer: { text: "Comment .take on an issue to claim it" }
              }]
            }' > /tmp/payload.json

          curl -sS -f -X POST -H "Content-Type: application/json" \
            -d @/tmp/payload.json "$WEBHOOK"
          echo "Standup posted."
