name: CI

on:
  pull_request:
  push:
    branches: [main, v2]

# Contributor PRs get read-only access to the repo. Nothing here can write.
permissions:
  contents: read

jobs:
  test:
    # Branch protection requires a status check named "Tests" — keep this name.
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Unit and pipeline tests
        run: npm test

      - name: Type check
        run: npm run check

      - name: Build the extension
        run: npm run build

      - name: Check for stray secrets
        run: |
          if grep -rInE '(sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|AKIA[0-9A-Z]{16})' \
              --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.output --exclude-dir=.wxt .; then
            echo "::error::Possible credential committed — remove it before merging."
            exit 1
          fi
          echo "No credential patterns found."
