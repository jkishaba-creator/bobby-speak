# This workflow exists so every mobile PR automatically produces a
# sideloadable APK for community testing (issue #10). It only fires once
# mobile/android/** exists in the repo — until then these path filters
# simply never match, which is expected.
name: Android build

on:
  pull_request:
    paths:
      - "mobile/android/**"
  push:
    branches: [main]
    paths:
      - "mobile/android/**"

permissions:
  contents: read

jobs:
  build-apk:
    name: build-apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Assemble debug APK
        working-directory: mobile/android
        run: gradle assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bobby-speak-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Print artifact location
        run: |
          echo "Debug APK uploaded as artifact 'bobby-speak-debug-apk'."
          echo "Download it from this workflow run's Summary page, under Artifacts,"
          echo "to sideload onto an Android device for community testing."
